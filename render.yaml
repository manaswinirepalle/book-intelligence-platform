services:
  - type: web
    name: book-intelligence-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py migrate && gunicorn wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DEBUG
        value: "False"
      - key: USE_SQLITE
        value: "True"
      - key: ALLOWED_HOSTS
        value: "*"
